name: Terraform CI/CD - Opella Challenge

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  # ==================== DOCUMENTATION JOB ====================
  docs:
    name: Update Terraform Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install terraform-docs
        run: |
          wget https://github.com/terraform-docs/terraform-docs/releases/download/v0.19.0/terraform-docs-v0.19.0-linux-amd64.tar.gz
          tar -xzf terraform-docs-v0.19.0-linux-amd64.tar.gz
          chmod +x terraform-docs
          sudo mv terraform-docs /usr/local/bin/

      - name: Generate VNet Module Documentation
        run: |
          cd modules/vnet
          terraform-docs markdown table --output-file README.md --output-mode inject .

      - name: Commit updated documentation (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add modules/vnet/README.md
          git diff --cached --quiet || git commit -m "docs: auto-update VNet module documentation with terraform-docs"
          git push

  # ==================== DEV JOB ====================
  terraform-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: docs
    permissions:
      id-token: write
      contents: read

    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7.0"

      - name: Terraform Init & Plan (Dev)
        working-directory: environments/dev
        run: |
          terraform init
          terraform plan -out=plan.tfplan

      - name: Terraform Apply (Dev)
        working-directory: environments/dev
        run: terraform apply -auto-approve plan.tfplan

  # ==================== PROD JOB ====================
  terraform-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: [docs, terraform-dev]
    environment: production
    permissions:
      id-token: write
      contents: read

    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7.0"

      - name: Terraform Init & Plan (Prod)
        working-directory: environments/prod
        run: |
          terraform init
          terraform plan -out=plan.tfplan

      - name: Terraform Apply (Prod)
        working-directory: environments/prod
        run: terraform apply -auto-approve plan.tfplan