name: Terraform CI/CD - Opella Challenge

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  terraform:
    name: Terraform ${{ matrix.environment }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, prod]

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC - secure, no secrets stored)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7.0"

      - name: Terraform Init & Plan
        working-directory: environments/${{ matrix.environment }}
        run: |
          terraform init
          terraform plan -out=plan.tfplan

      - name: Upload Terraform Plan (for easy review)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.environment }}
          path: environments/${{ matrix.environment }}/plan.tfplan

      - name: Terraform Apply - Dev
        if: matrix.environment == 'dev'
        working-directory: environments/dev
        run: terraform apply -auto-approve plan.tfplan

      - name: Terraform Apply - Prod (Manual Approval Required)
        if: matrix.environment == 'prod'
        environment: production
        working-directory: environments/prod
        run: terraform apply -auto-approve plan.tfplan