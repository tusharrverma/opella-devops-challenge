name: Terraform CI - Plan & Quality Checks

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  ci:
    name: Terraform CI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7.0"

      # === Quality Checks ===
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: TFLint
        continue-on-error: true
        run: |
          tflint --init
          tflint --recursive

      - name: Trivy Security Scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: 1   # Fail only on critical/high issues if you want

      - name: Update Module Documentation
        run: |
          cd modules/vnet
          terraform-docs markdown table --output-file README.md --output-mode inject .

      - name: Commit updated documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add modules/vnet/README.md
          git diff --cached --quiet || git commit -m "docs: auto-update VNet module documentation"
          git push

      # === Generate Plans ===
      - name: Terraform Plan (Dev)
        working-directory: environments/dev
        run: |
          terraform init
          terraform plan -out=plan.tfplan

      - name: Generate terraform-plan-dev.txt
        working-directory: environments/dev
        run: terraform show -no-color plan.tfplan > ../../terraform-plan-dev.txt

      - name: Terraform Plan (Prod)
        working-directory: environments/prod
        run: |
          terraform init
          terraform plan -out=plan.tfplan

      - name: Generate terraform-plan-prod.txt
        working-directory: environments/prod
        run: terraform show -no-color plan.tfplan > ../../terraform-plan-prod.txt

      - name: Commit updated plan files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add terraform-plan-dev.txt terraform-plan-prod.txt
          git diff --cached --quiet || git commit -m "chore: auto-update terraform plan files"
          git push

      # === Upload Quality Reports as Artifacts ===
      - name: Upload Quality Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            *.log
            trivy-report.*